<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bhavana & Mahender · Save the Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Audio (loops during game) -->
    <audio id="gameAudio" loop>
        <source src="audio1.mp3" type="audio/mpeg">
    </audio>

    <!-- Mute Button -->
    <button class="mute-button" id="muteButton" aria-label="Toggle music">
        <span id="muteIcon">🔊</span>
    </button>

    <!-- ============ PAGE 1: WELCOME ============ -->
    <div class="screen welcome-screen" id="welcomeScreen">
        <img src="template1.png" alt="" class="welcome-bg" />
        <div class="welcome-overlay">
            <button class="start-button" id="startButton">Start the Game</button>
            <p class="welcome-hint">✨ Match the pairs to reveal our special date ✨</p>
        </div>
    </div>

    <!-- ============ PAGE 2: MEMORY GAME (4×4 grid) ============ -->
    <div class="screen game-screen" id="gameScreen">
        <div class="game-info">
            <span class="info-pill">🎯 <strong id="moves">0</strong> moves</span>
            <span class="info-pill">⏱️ <strong id="timer">00:00</strong></span>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- 16 cards (8 pairs) generated by JS -->
        </div>

        <p class="game-footer">Bhavana <span class="amp-small">&amp;</span> Mahender</p>
    </div>

    <!-- ============ PAGE 3: SAVE THE DATE REVEAL ============ -->
    <!--
        template3 layout:
          · Mughal arch opening spans ~top 14% → ~72% of image height
          · Temple domes fill the bottom ~28%
          · invite-content is positioned with margin-top: 14vh so text
            sits neatly inside the arch and above the domes.
    -->
    <div class="screen invite-screen" id="inviteScreen">
        <img src="template3.png" alt="" class="invite-bg" />
        <div class="confetti-container" id="confettiContainer"></div>

        <div class="invite-content">
            <p class="invite-blessing">श्री गणेशाय नमः</p>
            <h1 class="invite-title">Save the Date</h1>

            <div class="invite-divider">
                <span></span><span class="diamond">◆</span><span></span>
            </div>

            <div class="invite-names">
                <span class="name">Bhavana</span>
                <span class="amp">&amp;</span>
                <span class="name">Mahender</span>
            </div>

            <p class="invite-date">1<sup>st</sup> July 2026</p>
            <p class="invite-venue">Om Convention Hall<br>Narsingi, Hyderabad</p>
            <p class="invite-message">We can't wait to celebrate with you! 💛</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
